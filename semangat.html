<!DOCTYPE html>
<html>
<head>
    <title>Semangat Cepat Sembuh! ❤️</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f0f8ff 0%, #e6fffa 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h1 { color: #ff6b6b; }
        input {
            padding: 12px;
            border-radius: 10px;
            border: 2px solid #4facfe;
            width: 80%;
            text-align: center;
            font-size: 16px;
            margin-bottom: 10px;
        }
        button {
            background: #4facfe;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }
        /* Animasi Salah */
        .shake {
            animation: shake 0.5s;
        }
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
            100% { transform: translateX(0); }
        }
        #halaman-ucapan { display: none; }
    </style>
</head>
<body>

    <div class="card" id="halaman-game">
        <div style="font-size: 40px;">🤔</div>
        <h1>Tebak-tebakan Dulu!</h1>
        <p>Gimana caranya orang bungkuk tidur?</p>
        <input type="text" id="jawaban" placeholder="Ketik jawabannya di sini...">
        <br>
        <button onclick="cekJawaban()">Jawab!</button>
        <p id="hint" style="color: red; font-size: 13px;"></p>
    </div>

    <div class="card" id="halaman-ucapan">
        <div style="font-size: 40px;">🌸</div>
        <h1>Get Well Soon!</h1>
        <p><i>"Yeay bener! Jawabannya merem lah ya, masa bungkuk juga tidurnya hehe. Kamu itu kuat, hebat, dan berharga. Semangat terus ya harinya, istirahat yang cukup!"</i></p>
        <p>❤️ <b>Luv!</b> ❤️</p>
        
        <hr>
        <p style="font-size: 11px;">🎵 Sekarang dengerin lagu ini ya...</p>
        <audio id="lagu" controls>
            <source src="lagu-kamu.mp3" type="audio/mpeg">
        </audio>
    </div>

<script>
    function cekJawaban() {
        const jawaban = document.getElementById('jawaban').value.toLowerCase();
        const gameCard = document.getElementById('halaman-game');
        const hint = document.getElementById('hint');

        // Jawaban yang benar adalah 'merem'
        if (jawaban.includes("merem")) {
            document.getElementById('halaman-game').style.display = "none";
            document.getElementById('halaman-ucapan').style.display = "block";
            document.getElementById('lagu').play(); // Lagu otomatis jalan
        } else {
            // Efek animasi salah (getar)
            gameCard.classList.add('shake');
            hint.innerHTML = "Salahhh! Ayo coba lagi...";
            setTimeout(() => { gameCard.classList.remove('shake'); }, 500);
        }
    }
</script>

</body>
</html>
