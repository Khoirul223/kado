<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pohon Cinta Kai</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/addons/p5.sound.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Courier New', monospace; background-color: white; }
        canvas { display: block; }
        #ui-layer {
            position: absolute;
            bottom: 150px;
            width: 100%;
            text-align: center;
            z-index: 10;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
            background: #333;
            color: white;
            border: 2px solid #000;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            box-shadow: 0 4px #000;
        }
        button:active { transform: translateY(2px); box-shadow: 0 2px #000; }
    </style>
</head>
<body>
    <div id="ui-layer">
        <button id="waterBtn" onclick="waterSapling()">Siram Bibit 💧</button>
    </div>

<script>
    let groundY, song, waterLevel = 0;
    let leaves = [], stars = [], shootingStars = [];
    let isBlooming = false, growthStartTime = 0, played = false;
    let bgColor = 255; 

    function preload() {
        // Pastikan file lagu.flower.mp3 ada di folder yang sama
        song = loadSound('lagu.flower.mp3'); 
    }

    function setup() {
        createCanvas(windowWidth, windowHeight);
        groundY = height - 113;
        // Siapkan posisi bintang statis
        for(let i=0; i<100; i++) stars.push({x: random(width), y: random(height*0.6), s: random(1,3)});
    }

    function draw() {
        background(bgColor);
        
        // Transisi ke mode malam
        if (waterLevel >= 1) {
            bgColor = lerp(bgColor, 0, 0.02);
            document.getElementById('ui-layer').style.display = 'none';
            drawNightSky();
        }

        drawDinoGround();

        // Gambar Pohon Bercabang (Fractal Tree)
        push();
        translate(width/2, groundY);
        let treeSize = map(waterLevel, 0, 1, 0, height * 0.18);
        drawBranch(treeSize, map(waterLevel, 0, 1, 1, 10));
        pop();

        // Munculkan daun saat sudah cukup gelap
        if (waterLevel >= 1 && bgColor < 80) {
            if (!isBlooming) {
                isBlooming = true;
                growthStartTime = millis();
                // Tambah 80 daun agar rimbun
                for (let i = 0; i < 80; i++) leaves.push(new Leaf(random(320, 360))); 
            }
        }

        if (isBlooming) {
            for (let leaf of leaves) { 
                leaf.update(); 
                leaf.display(); 
            }
            drawText();
        }
    }

    function drawDinoGround() {
        // Garis tanah hitam tegas ala Chrome Dino
        stroke(bgColor > 100 ? 50 : 200); 
        strokeWeight(2);
        line(0, groundY, width, groundY);
        
        // Tekstur tanah statis
        randomSeed(99); 
        for (let i = 0; i < width; i += 50) {
            if (random() > 0.6) {
                let x = i + random(-20, 20);
                line(x, groundY + 8, x + 12, groundY + 8); // Garis kecil
                point(x + 5, groundY + 14); // Titik kecil
            }
        }
    }

    function drawBranch(len, thickness) {
        stroke(bgColor > 100 ? 80 : 180);
        strokeWeight(max(1, thickness));
        line(0, 0, 0, -len);
        translate(0, -len);
        if (len > 8) {
            push();
            rotate(PI/4 * waterLevel);
            drawBranch(len * 0.7, thickness * 0.7);
            pop();
            push();
            rotate(-PI/6 * waterLevel);
            drawBranch(len * 0.7, thickness * 0.7);
            pop();
        }
    }

    function drawNightSky() {
        noStroke();
        fill(255, map(bgColor, 255, 0, 0, 255));
        for(let s of stars) ellipse(s.x, s.y, s.s);

        if (random(1) < 0.02) shootingStars.push(new ShootingStar());
        for (let i = shootingStars.length - 1; i >= 0; i--) {
            shootingStars[i].update();
            shootingStars[i].display();
            if (shootingStars[i].offScreen()) shootingStars.splice(i, 1);
        }
    }

    function waterSapling() {
        if (waterLevel < 1) waterLevel += 0.2;
        if (!played && song && song.isLoaded()) {
            song.loop();
            played = true;
        }
    }

    class ShootingStar {
        constructor() {
            this.x = random(width); this.y = random(height*0.3);
            this.speed = random(12, 25); this.w = random(60, 120);
        }
        update() { this.x -= this.speed; this.y += this.speed*0.5; }
        display() {
            stroke(255, 180); strokeWeight(1.5);
            line(this.x, this.y, this.x + this.w, this.y - this.w*0.5);
        }
        offScreen() { return this.x < -this.w || this.y > height; }
    }

    class Leaf {
        constructor(h) {
            this.h = h; 
            this.alpha = 0;
            this.init();
            // Beri waktu tunggu acak sebelum mulai gugur pertama kali
            this.fTime = random(2000, 25000); 
        }

        init() {
            // Posisi awal di dahan pohon (acak sekitar ujung pohon)
            this.x = width/2 + random(-70, 70);
            this.y = groundY - (height * 0.35) + random(-90, 40);
            this.isFixed = true; 
            this.onG = false;
            this.size = random(8, 14);
            this.rot = random(TWO_PI);
            this.fallSpeedY = random(0.8, 2);
            this.fallSpeedX = random(-1.2, -3); // Nilai negatif = ARAH KIRI
        }

        update() {
            if (this.alpha < 255) this.alpha += 5;
            
            // Cek apakah sudah waktunya gugur
            if (this.isFixed && (millis() - growthStartTime) > this.fTime) {
                this.isFixed = false;
            }

            if (!this.isFixed && !this.onG) {
                this.y += this.fallSpeedY;
                this.x += this.fallSpeedX; // Gerak ke samping kiri
                this.rot += 0.04;
                
                // Jika jatuh ke tanah atau keluar layar kiri, reset ke pohon
                if (this.y > groundY - 5 || this.x < -20) {
                    this.onG = true;
                    // Jeda sebentar di bawah sebelum muncul lagi di atas
                    setTimeout(() => {
                        this.init();
                        this.alpha = 0;
                        this.fTime = random(3000, 15000); // Reset waktu tunggu gugur
                    }, 2500);
                }
            }
        }

        display() {
            colorMode(HSB, 360, 100, 100, 255);
            drawingContext.shadowBlur = 18;
            drawingContext.shadowColor = color(this.h, 85, 100, this.alpha);
            fill(this.h, 75, 100, this.alpha);
            noStroke();
            
            push(); 
            translate(this.x, this.y);
            rotate(this.rot);
            beginShape(); 
            vertex(0,0); 
            bezierVertex(-this.size, -this.size/2, -this.size, this.size, 0, this.size);
            bezierVertex(this.size, this.size, this.size, -this.size/2, 0,0); 
            endShape(CLOSE);
            pop();
            
            drawingContext.shadowBlur = 0;
            colorMode(RGB, 255);
        }
    }

    function drawText() {
        fill(200); noStroke(); textAlign(LEFT, BOTTOM); 
        textFont('Courier New'); textSize(12);
        text("creation of kai sund_blue", 25, height - 61);
        text("09/03/2026", 25, height - 43);
        fill(150);
        text("Find your happiness and don't be ashamed to express it. Believe me, you are special to the people around you.", 25, height - 25);
    }

    function windowResized() { 
        resizeCanvas(windowWidth, windowHeight); 
        groundY = height - 113; 
    }
</script>
</body>
</html>
