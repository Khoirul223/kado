<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pohon Cinta Kai</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/addons/p5.sound.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Courier New', monospace; background-color: white; }
        canvas { display: block; }
        #ui-layer { position: absolute; bottom: 150px; width: 100%; text-align: center; z-index: 10; }
        button {
            padding: 12px 24px; font-size: 16px; cursor: pointer; background: #333; color: white;
            border: 2px solid #000; border-radius: 5px; font-family: 'Courier New', monospace; font-weight: bold;
            box-shadow: 0 4px #000;
        }
        button:active { transform: translateY(2px); box-shadow: 0 2px #000; }
    </style>
</head>
<body>
    <div id="ui-layer"><button id="waterBtn" onclick="waterSapling()">Siram Bibit 💧</button></div>

<script>
    let groundY, song, waterLevel = 0;
    let leaves = [], stars = [], shootingStars = [], branchTips = [];
    let isBlooming = false, growthStartTime = 0, played = false;
    let bgColor = 255; 

    function preload() { 
        song = loadSound('lagu.flower.mp3'); 
    }

    function setup() {
        createCanvas(windowWidth, windowHeight);
        groundY = height - 113;
        // Bintang malam
        for(let i=0; i<80; i++) stars.push({x: random(width), y: random(height*0.6), s: random(1,2)});
    }

    function draw() {
        background(bgColor);
        
        if (waterLevel >= 1) {
            bgColor = lerp(bgColor, 0, 0.02);
            document.getElementById('ui-layer').style.display = 'none';
            drawNightSky();
        }
        
        drawDinoGround();

        // Gambar Pohon
        branchTips = []; 
        push();
        translate(width/2, groundY);
        let treeSize = map(waterLevel, 0, 1, 0, height * 0.16);
        drawBranch(treeSize, map(waterLevel, 0, 1, 1, 12));
        pop();

        // Trigger muncul daun
        if (waterLevel >= 1 && bgColor < 150) {
            if (!isBlooming && branchTips.length > 0) {
                isBlooming = true;
                growthStartTime = millis();
                // Buat daun di setiap ujung dahan yang terdeteksi
                for (let i = 0; i < 150; i++) {
                    let target = random(branchTips);
                    leaves.push(new Leaf(random(330, 360), target.x, target.y));
                }
            }
        }

        if (isBlooming) {
            for (let leaf of leaves) { leaf.update(); leaf.display(); }
            drawText();
        }
    }

    function drawDinoGround() {
        stroke(bgColor > 100 ? 50 : 180); strokeWeight(2);
        line(0, groundY, width, groundY);
        randomSeed(99);
        for (let i = 0; i < width; i += 60) {
            if (random() > 0.6) {
                let x = i + random(-20, 20);
                line(x, groundY + 8, x + 10, groundY + 8);
                point(x + 3, groundY + 12);
            }
        }
    }

    function drawBranch(len, thickness) {
        stroke(bgColor > 100 ? 80 : 160);
        strokeWeight(max(0.5, thickness));
        
        // Batang meliuk (Realistic)
        let n = noise(len * 0.1, frameCount * 0.005);
        let rotMod = map(n, 0, 1, -0.05, 0.05);
        
        line(0, 0, 0, -len);
        translate(0, -len);

        if (len > 8) {
            push();
            rotate(PI/4 * waterLevel + rotMod);
            drawBranch(len * 0.72, thickness * 0.7);
            pop();
            push();
            rotate(-PI/6 * waterLevel - rotMod);
            drawBranch(len * 0.72, thickness * 0.7);
            pop();
        } else {
            // Cara baru ambil koordinat ujung dahan yang lebih akurat
            let matrix = drawingContext.getTransform();
            branchTips.push({ x: matrix.e, y: matrix.f });
        }
    }

    function drawNightSky() {
        fill(255, map(bgColor, 255, 0, 0, 200)); noStroke();
        for(let s of stars) ellipse(s.x, s.y, s.s);
        if (random(1) < 0.01) shootingStars.push(new ShootingStar());
        for (let i = shootingStars.length - 1; i >= 0; i--) {
            shootingStars[i].update(); shootingStars[i].display();
            if (shootingStars[i].offScreen()) shootingStars.splice(i, 1);
        }
    }

    function waterSapling() {
        if (waterLevel < 1) waterLevel += 0.2;
        if (!played && song && song.isLoaded()) { song.loop(); played = true; }
    }

    class ShootingStar {
        constructor() { this.x = random(width); this.y = random(height*0.3); this.speed = 15; }
        update() { this.x -= this.speed; this.y += this.speed*0.4; }
        display() { stroke(255, 150); line(this.x, this.y, this.x + 40, this.y - 16); }
        offScreen() { return this.x < -100; }
    }

    class Leaf {
        constructor(h, x, y) {
            this.h = h; this.spawnX = x; this.spawnY = y;
            this.init();
            this.fTime = random(4000, 20000); 
            this.alpha = 0;
        }
        init() {
            this.x = this.spawnX + random(-10, 10); 
            this.y = this.spawnY + random(-10, 10);
            this.isFixed = true; this.onG = false;
            this.size = random(6, 12);
            this.rot = random(TWO_PI);
            this.fallY = random(0.4, 0.8); // Gerak lambat
            this.fallX = random(-0.8, -2); // Tertiup ke kiri
        }
        update() {
            if (this.alpha < 255) this.alpha += 3;
            if (this.isFixed && (millis() - growthStartTime) > this.fTime) this.isFixed = false;
            
            if (!this.isFixed && !this.onG) {
                this.y += this.fallY;
                this.x += this.fallX + sin(frameCount * 0.02) * 0.3; 
                this.rot += 0.02;
                if (this.y > groundY - 3 || this.x < -20) {
                    this.onG = true;
                    setTimeout(() => { this.init(); this.alpha = 0; }, 2000);
                }
            }
        }
        display() {
            colorMode(HSB, 360, 100, 100, 255);
            drawingContext.shadowBlur = 15;
            drawingContext.shadowColor = color(this.h, 90, 100, this.alpha);
            fill(this.h, 80, 100, this.alpha); noStroke();
            push(); translate(this.x, this.y); rotate(this.rot);
            beginShape(); vertex(0,0); bezierVertex(-this.size, -this.size/2, -this.size, this.size, 0, this.size);
            bezierVertex(this.size, this.size, this.size, -this.size/2, 0,0); endShape(CLOSE);
            pop();
            drawingContext.shadowBlur = 0; colorMode(RGB, 255);
        }
    }

    function drawText() {
        fill(180); noStroke(); textFont('Courier New'); textSize(11);
        text("creation of kai sund_blue", 25, height - 61);
        text("09/03/2026", 25, height - 43);
        fill(130);
        text("Find your happiness and don't be ashamed to express it. Believe me, you are special to the people around you.", 25, height - 25);
    }
    function windowResized() { resizeCanvas(windowWidth, windowHeight); groundY = height - 113; }
</script>
</body>
</html>
