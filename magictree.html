<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garden of Smiles</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Langit & Awan */
        .sky {
            position: relative;
            height: 100vh;
            background: linear-gradient(to bottom, #f0f8ff, #ffffff);
        }

        .cloud {
            position: absolute;
            background: #fff;
            width: 100px;
            height: 40px;
            border-radius: 50px;
            opacity: 0.8;
            filter: blur(5px);
            animation: moveClouds 20s linear infinite;
        }

        @keyframes moveClouds {
            from { left: -150px; }
            to { left: 100vw; }
        }

        /* Tanah ala Chrome Dino */
        .ground {
            position: absolute;
            bottom: 100px;
            width: 100%;
            height: 2px;
            background: #535353;
        }

        .ground-detail {
            position: absolute;
            bottom: 80px;
            width: 100%;
            height: 20px;
            background-image: radial-gradient(#535353 1px, transparent 1px);
            background-size: 50px 20px;
            opacity: 0.3;
        }

        /* Area Pohon & Api Unggun */
        .scene {
            position: absolute;
            bottom: 102px;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        .bench {
            width: 60px;
            height: 30px;
            border: 3px solid #5d4037;
            border-bottom: none;
            position: relative;
            margin: 0 40px;
        }

        /* Api Unggun */
        .campfire {
            position: relative;
            width: 40px;
            height: 40px;
        }
        .log {
            position: absolute;
            width: 30px;
            height: 8px;
            background: #5d4037;
            bottom: 0;
            transform: rotate(-20deg);
        }
        .fire {
            position: absolute;
            bottom: 5px;
            left: 10px;
            width: 20px;
            height: 20px;
            background: orange;
            border-radius: 50% 50% 20% 20%;
            filter: blur(2px);
            box-shadow: 0 0 15px orange, 0 0 25px red;
            animation: flicker 0.15s infinite alternate;
        }

        @keyframes flicker {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.1); opacity: 1; }
        }

        /* Pohon */
        #tree-container {
            position: absolute;
            right: 15%;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        canvas {
            filter: drop-shadow(0 0 5px rgba(255, 0, 150, 0.3));
        }

        /* Kontrol */
        .controls {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
        }

        button {
            padding: 10px 20px;
            font-size: 20px;
            cursor: pointer;
            border-radius: 50px;
            border: none;
            background: #ff4081;
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        button:hover { transform: scale(1.1); }

        /* Footer Teks */
        .footer-info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: #535353;
            font-size: 14px;
            max-width: 300px;
        }

        .quotes {
            font-style: italic;
            margin-top: 5px;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="sky" id="sky">
        <div class="controls">
            <button onclick="growTree()">💧 Siram Pohon</button>
        </div>

        <div class="scene">
            <div class="bench" style="transform: scaleX(-1);"></div>
            <div class="campfire">
                <div class="log" style="transform: rotate(20deg);"></div>
                <div class="log"></div>
                <div class="fire"></div>
            </div>
            <div class="bench"></div>
        </div>

        <div id="tree-container">
            <canvas id="treeCanvas"></canvas>
        </div>

        <div class="ground"></div>
        <div class="ground-detail"></div>

        <div class="footer-info">
            <div>creation of kai sund_blue</div>
            <div id="current-date"></div>
            <div class="quotes">"Find your happiness and don't be shy to express it because the world knows that you have a beautiful smile"</div>
        </div>
    </div>

    <audio id="bgm" loop>
        <source src="flower.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Tanggal Hari Ini
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('id-ID', {
            day: 'numeric', month: 'long', year: 'numeric'
        });

        // Setup Canvas untuk Pohon
        const canvas = document.getElementById('treeCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 400;
        canvas.height = 400;

        let growthStep = 0;
        let leaves = [];
        let windAngle = 0;

        function drawTree(step) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (step === 0) return; // Bibit belum ada

            const startX = canvas.width / 2;
            const startY = canvas.height;
            
            if (step === 1) { // Bibit
                ctx.fillStyle = "brown";
                ctx.fillRect(startX - 2, startY - 10, 4, 10);
            } else if (step === 2) { // Tunas
                ctx.strokeStyle = "green";
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(startX, startY);
                ctx.quadraticCurveTo(startX + 5, startY - 20, startX + 10, startY - 30);
                ctx.stroke();
            } else { // Pohon Realistic
                const len = step * 15;
                drawBranch(startX, startY, len, 0, 10);
            }
        }

        function drawBranch(x, y, len, angle, branchWidth) {
            ctx.beginPath();
            ctx.save();
            ctx.strokeStyle = "#5d4037";
            ctx.lineWidth = branchWidth;
            ctx.translate(x, y);
            ctx.rotate((angle + Math.sin(windAngle) * 0.05) * Math.PI / 180);
            ctx.moveTo(0, 0);
            ctx.lineTo(0, -len);
            ctx.stroke();

            if (len < 15) {
                // Daun Neon
                ctx.beginPath();
                ctx.fillStyle = Math.random() > 0.5 ? "#ff007f" : "#ff4d4d"; // Pink/Merah Neon
                ctx.shadowBlur = 10;
                ctx.shadowColor = ctx.fillStyle;
                ctx.ellipse(0, -len, 8, 4, Math.random(), 0, Math.PI * 2);
                ctx.fill();
                
                // Tambahkan efek daun berguguran
                if (Math.random() > 0.98) {
                    createFallingLeaf(x, y - len);
                }
                
                ctx.restore();
                return;
            }

            drawBranch(0, -len, len * 0.75, angle + 25, branchWidth * 0.7);
            drawBranch(0, -len, len * 0.75, angle - 25, branchWidth * 0.7);
            ctx.restore();
        }

        function growTree() {
            const audio = document.getElementById('bgm');
            audio.play().catch(() => {}); // Autoplay bypass
            
            if (growthStep < 6) {
                growthStep++;
            }
        }

        function createFallingLeaf(x, y) {
            leaves.push({
                x: x + (canvas.width / 2) + 50, // Penyesuaian posisi canvas
                y: canvas.height - y + 150,
                speedY: 0.5 + Math.random(),
                speedX: (Math.random() - 0.5) * 1,
                color: Math.random() > 0.5 ? "#ff007f" : "#ff4d4d"
            });
        }

        function animate() {
            windAngle += 0.02;
            drawTree(growthStep);
            
            // Render Daun Gugur di luar canvas pohon
            leaves.forEach((leaf, index) => {
                leaf.y += leaf.speedY;
                leaf.x += Math.sin(windAngle + index);
                
                const leafDiv = document.createElement('div');
                ctx.shadowBlur = 5;
                ctx.fillStyle = leaf.color;
                ctx.beginPath();
                ctx.arc(leaf.x - 100, leaf.y - 100, 3, 0, Math.PI * 2);
                ctx.fill();

                if (leaf.y > window.innerHeight) leaves.splice(index, 1);
            });

            requestAnimationFrame(animate);
        }

        // Generate Awan Acak
        for (let i = 0; i < 5; i++) {
            let cloud = document.createElement('div');
            cloud.className = 'cloud';
            cloud.style.top = Math.random() * 200 + 'px';
            cloud.style.animationDelay = Math.random() * 20 + 's';
            document.getElementById('sky').appendChild(cloud);
        }

        animate();
    </script>
</body>
</html>
