<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pohon Cinta Kai</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/addons/p5.sound.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Courier New', monospace; }
        canvas { display: block; }
        #ui-layer {
            position: absolute;
            bottom: 150px;
            width: 100%;
            text-align: center;
            z-index: 10;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 20px;
            box-shadow: 0 4px #2e7d32;
        }
        button:active { transform: translateY(2px); box-shadow: 0 2px #2e7d32; }
    </style>
</head>
<body>
    <div id="ui-layer">
        <button id="waterBtn" onclick="waterSapling()">Siram Bibit 💧</button>
    </div>

<script>
    let sapling, groundY, song, waterLevel = 0;
    let leaves = [], isBlooming = false, growthStartTime = 0, played = false;
    let bgColor = 255; // Mulai dari putih

    function preload() {
        song = loadSound('lagu.flower.mp3'); 
    }

    function setup() {
        createCanvas(windowWidth, windowHeight);
        groundY = height - 113;
        sapling = { x: width/2, y: groundY, h: 10, w: 2 };
    }

    function draw() {
        background(bgColor);
        
        // Gambar Tanah Bertekstur
        drawGround();

        // Update & Gambar Batang (Warna Abu-abu)
        let targetH = map(waterLevel, 0, 1, 10, height * 0.5);
        sapling.h = lerp(sapling.h, targetH, 0.1);
        sapling.w = map(waterLevel, 0, 1, 2, 12);
        
        stroke(150);
        strokeWeight(sapling.w);
        line(sapling.x, sapling.y, sapling.x, sapling.y - sapling.h);

        // Transisi ke Hitam & Muncul Daun
        if (waterLevel >= 1) {
            bgColor = lerp(bgColor, 0, 0.05);
            document.getElementById('ui-layer').style.display = 'none';
            
            if (!isBlooming && bgColor < 10) {
                isBlooming = true;
                growthStartTime = millis();
                for (let i = 0; i < 60; i++) leaves.push(new Leaf(random(360)));
            }
        }

        if (isBlooming) {
            colorMode(HSB, 360, 100, 100, 1);
            for (let leaf of leaves) { leaf.update(); leaf.display(); }
            colorMode(RGB, 255);
            drawText();
        }
    }

    function drawGround() {
        stroke(100, 70, 40); // Warna cokelat tanah
        strokeWeight(4);
        line(0, groundY, width, groundY);
        
        // Efek tekstur tanah (rumput/batu kecil)
        for (let i = 0; i < width; i += 20) {
            stroke(80, 60, 30);
            line(i, groundY, i + 5, groundY - random(2, 5));
        }
    }

    function waterSapling() {
        if (waterLevel < 1) waterLevel += 0.2;
        if (!played && song.isLoaded()) {
            song.loop();
            played = true;
        }
    }

    class Leaf {
        constructor(h) {
            this.px = width/2; this.py = groundY - (height*0.5);
            this.h = h; this.size = random(8, 16);
            let a = random(TWO_PI), r = random(80);
            this.x = this.px + cos(a)*r; this.y = this.py + sin(a)*r*0.6;
            this.isFixed = true; this.onG = false;
            this.fTime = random(2000, 10000); this.alpha = 0;
        }
        update() {
            if (this.alpha < 1) this.alpha += 0.02;
            if (this.isFixed && (millis() - growthStartTime) > this.fTime) this.isFixed = false;
            if (!this.isFixed && !this.onG) {
                this.y += random(0.5, 1.2);
                this.x += sin(frameCount*0.03 + this.h)*0.4;
                if (this.y > groundY - 5) this.onG = true;
            }
        }
        display() {
            drawingContext.shadowBlur = 15;
            drawingContext.shadowColor = color(this.h, 90, 100, this.alpha);
            fill(this.h, 80, 100, this.alpha);
            push(); translate(this.x, this.y);
            if (this.onG) rotate(this.h);
            beginShape(); vertex(0,0); bezierVertex(-this.size/2, -this.size/2, -this.size, this.size/3, 0, this.size);
            bezierVertex(this.size, this.size/3, this.size/2, -this.size/2, 0,0); endShape(CLOSE);
            pop();
            drawingContext.shadowBlur = 0;
        }
    }

    function drawText() {
        fill(180); noStroke(); textAlign(LEFT, BOTTOM); textSize(12);
        text("creation of kai sund_blue", 25, height - 61);
        text("09/03/2026", 25, height - 43);
        fill(130);
        text("Find your happiness and don't be ashamed to express it. Believe me, you are special to the people around you.", 25, height - 25);
    }

    function windowResized() { resizeCanvas(windowWidth, windowHeight); groundY = height - 113; }
</script>
</body>
</html>
