<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pohon Cinta Kai - Anti Zoom Fix</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/addons/p5.sound.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Courier New', monospace; background-color: white; }
        canvas { display: block; }
        #ui-layer { position: absolute; bottom: 150px; width: 100%; text-align: center; z-index: 10; }
        button {
            padding: 12px 24px; font-size: 16px; cursor: pointer; background: #333; color: white;
            border: 2px solid #000; border-radius: 5px; font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="ui-layer"><button id="waterBtn" onclick="waterSapling()">Siram Bibit 💧</button></div>

<script>
    let groundY, song, waterLevel = 0;
    let stars = [], shootingStars = [];
    let isBlooming = false, played = false;
    let bgColor = 255; 

    function preload() { 
        song = loadSound('lagu.flower.mp3'); 
    }

    function setup() {
        // Menggunakan pixelDensity(1) agar resolusi tidak berubah saat zoom browser
        pixelDensity(1);
        createCanvas(windowWidth, windowHeight);
        groundY = height - 113;
        for(let i=0; i<150; i++) stars.push({x: random(width), y: random(height*0.8), s: random(1, 3)});
    }

    function draw() {
        background(bgColor);
        
        if (waterLevel >= 1) {
            bgColor = lerp(bgColor, 10, 0.02);
            document.getElementById('ui-layer').style.display = 'none';
            drawNightSky();
        }
        
        drawDinoGround();

        if (isBlooming) {
            drawCampground();
            drawText();
        }

        // Gambar Pohon
        push();
        // Memastikan posisi pohon selalu di tengah bawah secara presisi
        translate(width/2, groundY);
        let treeSize = map(waterLevel, 0, 1, 0, height * 0.16);
        drawBranch(treeSize, map(waterLevel, 0, 1, 1, 12));
        pop();
    }

    function drawDinoGround() {
        stroke(bgColor > 100 ? 50 : 180); strokeWeight(2);
        line(0, groundY, width, groundY);
    }

    function drawBranch(len, thickness) {
        stroke(bgColor > 100 ? 80 : 160);
        strokeWeight(max(0.5, thickness));
        
        let n = noise(len * 0.1, frameCount * 0.005);
        let rotMod = map(n, 0, 1, -0.02, 0.02);
        
        line(0, 0, 0, -len);
        translate(0, -len);

        if (len > 8) {
            push();
            rotate(PI/4 * waterLevel + rotMod);
            drawBranch(len * 0.72, thickness * 0.7);
            pop();
            push();
            rotate(-PI/6 * waterLevel - rotMod);
            drawBranch(len * 0.72, thickness * 0.7);
            pop();
        } else if (waterLevel >= 1 && bgColor < 200) {
            isBlooming = true;
            // Bunga digambar langsung di dahan agar ikut bergerak & stabil
            drawFlowerOnBranch();
        }
    }

    function drawFlowerOnBranch() {
        push();
        colorMode(HSB, 360, 100, 100, 255);
        noStroke();
        fill(random(330, 360), 60, 100, 150);
        // Kelopak bunga yang lebih rapat agar tidak melayang
        for(let i=0; i<6; i++) {
            ellipse(1, 0, 6, 4);
            rotate(TWO_PI/6);
        }
        pop();
    }

    function drawNightSky() {
        fill(255, map(bgColor, 255, 10, 0, 200)); noStroke();
        for(let s of stars) ellipse(s.x, s.y, s.s);
        
        if (random(1) < 0.1) shootingStars.push(new ShootingStar());
        
        for (let i = shootingStars.length - 1; i >= 0; i--) {
            shootingStars[i].update(); shootingStars[i].display();
            if (shootingStars[i].offScreen()) shootingStars.splice(i, 1);
        }
    }

    function drawCampground() {
        // Menggunakan width * 0.5 + offset agar posisinya relatif terhadap pohon di tengah
        let baseX = width * 0.5 + 150; 
        let baseY = groundY;
        
        push();
        // Tenda
        fill(40, 70, 40); stroke(20);
        triangle(baseX, baseY, baseX + 80, baseY, baseX + 40, baseY - 60);
        
        // Api Unggun
        let fireX = baseX + 110;
        fill(100, 50, 20); rect(fireX - 10, baseY - 5, 20, 5);
        colorMode(HSB, 360, 100, 100);
        fill(random(10, 40), 100, 100);
        ellipse(fireX, baseY - 15, 12, 22);
        
        // Kursi
        colorMode(RGB, 255);
        fill(100, 60, 30);
        rect(baseX - 45, baseY - 12, 25, 8);
        pop();
    }

    function waterSapling() {
        if (waterLevel < 1) waterLevel += 0.2;
        if (!played && song && song.isLoaded()) { song.loop(); played = true; }
    }

    class ShootingStar {
        constructor() {
            this.x = random(width * 0.2, width);
            this.y = random(0, height * 0.3);
            this.speed = random(12, 28);
            this.w = random(5, 10); // Komet tebal agar terlihat
        }
        update() {
            this.x -= this.speed;
            this.y += this.speed * 0.5;
        }
        display() {
            push();
            drawingContext.shadowBlur = 25;
            drawingContext.shadowColor = 'white';
            stroke(255);
            strokeWeight(this.w);
            line(this.x, this.y, this.x + 180, this.y - 90); // Ekor sangat panjang
            pop();
        }
        offScreen() { return this.x < -300; }
    }

    function drawText() {
        fill(180); noStroke(); textSize(11);
        text("creation of kai sund_blue", 25, height - 60);
        text("09/03/2026", 25, height - 40);
        text("Find your happiness and don't be ashamed to express it.", 25, height - 20);
    }

    function windowResized() { 
        resizeCanvas(windowWidth, windowHeight); 
        groundY = height - 113; 
    }
</script>
</body>
</html>
