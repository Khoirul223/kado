<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pohon Cinta Kai</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/addons/p5.sound.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Courier New', monospace; background-color: white; }
        canvas { display: block; }
        #ui-layer { position: absolute; bottom: 150px; width: 100%; text-align: center; z-index: 10; }
        button {
            padding: 12px 24px; font-size: 16px; cursor: pointer; background: #333; color: white;
            border: 2px solid #000; border-radius: 5px; font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="ui-layer"><button id="waterBtn" onclick="waterSapling()">Siram Bibit 💧</button></div>

<script>
    let groundY, song, waterLevel = 0;
    let leaves = [], stars = [], shootingStars = [];
    let isBlooming = false, growthStartTime = 0, played = false;
    let bgColor = 255; 

    function preload() { 
        // Pastikan file ini ada di GitHub kamu
        song = loadSound('lagu.flower.mp3'); 
    }

    function setup() {
        createCanvas(windowWidth, windowHeight);
        groundY = height - 113;
        for(let i=0; i<80; i++) stars.push({x: random(width), y: random(height*0.6), s: random(1,2)});
    }

    function draw() {
        background(bgColor);
        
        if (waterLevel >= 1) {
            bgColor = lerp(bgColor, 0, 0.02);
            document.getElementById('ui-layer').style.display = 'none';
            drawNightSky();
            drawCampfireScene(); // Tambahkan api unggun & kursi
        }
        
        drawDinoGround();

        // Gambar Pohon (Digeser ke kanan: width * 0.7)
        push();
        translate(width * 0.7, groundY);
        let treeSize = map(waterLevel, 0, 1, 0, height * 0.16);
        drawBranch(treeSize, map(waterLevel, 0, 1, 1, 12));
        pop();

        if (isBlooming) {
            for (let i = leaves.length - 1; i >= 0; i--) {
                leaves[i].update();
                leaves[i].display();
            }
            drawText();
        }
    }

    function drawCampfireScene() {
        let centerX = width / 2 - 50;
        let ground = groundY;

        // Kursi Kiri
        stroke(100); strokeWeight(3);
        line(centerX - 80, ground, centerX - 80, ground - 20); // kaki
        line(centerX - 40, ground, centerX - 40, ground - 20); // kaki
        line(centerX - 90, ground - 20, centerX - 30, ground - 20); // dudukan
        line(centerX - 85, ground - 20, centerX - 85, ground - 45); // sandaran

        // Kursi Kanan (Berhadapan)
        line(centerX + 80, ground, centerX + 80, ground - 20);
        line(centerX + 40, ground, centerX + 40, ground - 20);
        line(centerX + 90, ground - 20, centerX + 30, ground - 20);
        line(centerX + 85, ground - 20, centerX + 85, ground - 45);

        // Kayu Api Unggun
        stroke(60, 30, 10); strokeWeight(4);
        line(centerX - 10, ground, centerX + 10, ground - 5);
        line(centerX + 10, ground, centerX - 10, ground - 5);

        // Animasi Api
        noStroke();
        for (let i = 0; i < 5; i++) {
            fill(255, random(100, 200), 0, 200);
            let fireH = random(15, 35);
            ellipse(centerX + random(-5, 5), ground - 5 - random(0, 10), random(10, 20), fireH);
        }
        // Cahaya Api (Glow)
        fill(255, 150, 0, 30);
        ellipse(centerX, ground - 10, 60, 60);
    }

    function drawDinoGround() {
        stroke(bgColor > 100 ? 50 : 180); strokeWeight(2);
        line(0, groundY, width, groundY);
    }

    function drawBranch(len, thickness) {
        stroke(bgColor > 100 ? 80 : 160);
        strokeWeight(max(0.5, thickness));
        
        let n = noise(len * 0.1, frameCount * 0.005);
        let rotMod = map(n, 0, 1, -0.05, 0.05);
        
        line(0, 0, 0, -len);
        translate(0, -len);

        if (len > 8) {
            push();
            rotate(PI/4 * waterLevel + rotMod);
            drawBranch(len * 0.72, thickness * 0.7);
            pop();
            push();
            rotate(-PI/6 * waterLevel - rotMod);
            drawBranch(len * 0.72, thickness * 0.7);
            pop();
        } else if (waterLevel >= 1 && bgColor < 150) {
            // Logika baru: Ambil posisi dahan saat ini menggunakan screenX/screenY
            if (!isBlooming) {
                isBlooming = true;
                growthStartTime = millis();
            }
            if (leaves.length < 400 && random(1) < 0.15) {
                // screenX dan screenY memastikan bunga muncul tepat di koordinat dahan terakhir
                leaves.push(new Leaf(random(330, 360), screenX(0,0), screenY(0,0)));
            }
        }
    }

    function drawNightSky() {
        fill(255, map(bgColor, 255, 0, 0, 200)); noStroke();
        for(let s of stars) ellipse(s.x, s.y, s.s);
        if (random(1) < 0.01) shootingStars.push(new ShootingStar());
        for (let i = shootingStars.length - 1; i >= 0; i--) {
            shootingStars[i].update(); shootingStars[i].display();
            if (shootingStars[i].offScreen()) shootingStars.splice(i, 1);
        }
    }

    function waterSapling() {
        if (waterLevel < 1) waterLevel += 0.2;
        if (!played && song && song.isLoaded()) { song.loop(); played = true; }
    }

    class ShootingStar {
        constructor() { this.x = random(width); this.y = random(height*0.3); this.speed = 15; }
        update() { this.x -= this.speed; this.y += this.speed*0.4; }
        display() { stroke(255, 150); line(this.x, this.y, this.x + 40, this.y - 16); }
        offScreen() { return this.x < -100; }
    }

    class Leaf {
        constructor(h, x, y) {
            this.h = h; this.spawnX = x; this.spawnY = y;
            this.init();
            this.alpha = 0;
            this.fTime = random(2000, 15000); 
        }
        init() {
            this.x = this.spawnX; this.y = this.spawnY;
            this.isFixed = true; this.onG = false;
            this.size = random(6, 10);
            this.rot = random(TWO_PI);
            this.fallY = random(0.8, 1.5);
            this.fallX = random(-1, 1);
        }
        update() {
            if (this.alpha < 255) this.alpha += 5;
            if (this.isFixed && (millis() - growthStartTime) > this.fTime) this.isFixed = false;
            if (!this.isFixed && !this.onG) {
                this.y += this.fallY;
                this.x += this.fallX + sin(frameCount * 0.02) * 0.5;
                this.rot += 0.05;
                if (this.y > groundY - 3) {
                    this.onG = true;
                    setTimeout(() => { this.init(); this.alpha = 0; }, 3000);
                }
            }
        }
        display() {
            colorMode(HSB, 360, 100, 100, 255);
            fill(this.h, 80, 100, this.alpha); noStroke();
            push(); translate(this.x, this.y); rotate(this.rot);
            beginShape(); 
            vertex(0,0); 
            bezierVertex(-this.size, -this.size/2, -this.size, this.size, 0, this.size);
            bezierVertex(this.size, this.size, this.size, -this.size/2, 0,0); 
            endShape(CLOSE);
            pop();
            colorMode(RGB, 255);
        }
    }

    function drawText() {
        fill(180); noStroke(); textFont('Courier New'); textSize(10);
        text("creation of kai sund_blue", 25, height - 61);
        text("09/03/2026", 25, height - 43);
        text("Find your happiness and don't be ashamed to express it.", 25, height - 25);
    }
    function windowResized() { resizeCanvas(windowWidth, windowHeight); groundY = height - 113; }
</script>
</body>
</html>
