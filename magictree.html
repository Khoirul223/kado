<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pohon Cinta Kai - Final Revision</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/addons/p5.sound.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: white; }
        canvas { display: block; }
        #ui-layer { position: absolute; bottom: 15%; width: 100%; text-align: center; z-index: 10; }
        button {
            padding: 12px 24px; font-size: 16px; cursor: pointer; background: #333; color: white;
            border: 2px solid #000; border-radius: 5px; font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="ui-layer"><button id="waterBtn" onclick="waterSapling()">Siram Bibit 💧</button></div>

<script>
    let groundY, song, waterLevel = 0;
    let stars = [], shootingStars = [], fallingLeaves = [];
    let isBlooming = false, played = false;
    let bgColor = 255; 

    function preload() { 
        song = loadSound('lagu.flower.mp3'); 
    }

    function setup() {
        pixelDensity(1); 
        createCanvas(windowWidth, windowHeight);
        groundY = height * 0.85;
        // Inisialisasi bintang
        for(let i=0; i<150; i++) stars.push({x: random(width), y: random(height*0.8), s: random(1, 3)});
    }

    function draw() {
        background(bgColor);
        
        if (waterLevel >= 1) {
            bgColor = lerp(bgColor, 10, 0.02);
            document.getElementById('ui-layer').style.display = 'none';
            drawNightSky();
        }
        
        // --- 1. Gambar Tanah & Rumput ---
        drawDinoGround();

        if (isBlooming) {
            drawCampground();
            
            // --- 2. Gambar Daun yang Gugur ---
            for (let i = fallingLeaves.length - 1; i >= 0; i--) {
                fallingLeaves[i].update();
                fallingLeaves[i].display();
                // Hapus jika sudah pudar di tanah
                if (fallingLeaves[i].alpha <= 0) fallingLeaves.splice(i, 1);
            }
            
            // --- 4. Gambar Teks (Responsive) ---
            drawText();
        }

        // Gambar Pohon
        push();
        translate(width/2, groundY);
        let treeSize = map(waterLevel, 0, 1, 0, height * 0.18);
        drawBranch(treeSize, map(waterLevel, 0, 1, 1, 12));
        pop();
    }

    function drawDinoGround() {
        stroke(bgColor > 100 ? 50 : 180); strokeWeight(2);
        line(0, groundY, width, groundY);
        
        // --- Detail Rumput & Titik ---
        randomSeed(99); // Agar rumputnya tidak gerak-gerak
        let detailColor = bgColor > 100 ? 80 : 160;
        for (let i = 0; i < width; i += 40) {
            if (random() > 0.5) {
                let x = i + random(-15, 15);
                stroke(detailColor); strokeWeight(1);
                line(x, groundY + 5, x + 8, groundY + 5); // Rumput garis
                point(x + 3, groundY + 10); // Titik kecil
            }
        }
    }

    function drawBranch(len, thickness) {
        stroke(bgColor > 100 ? 80 : 160);
        strokeWeight(max(0.5, thickness));
        let n = noise(len * 0.1, frameCount * 0.005);
        let rotMod = map(n, 0, 1, -0.02, 0.02);
        
        line(0, 0, 0, -len);
        translate(0, -len);

        if (len > 8) {
            push();
            rotate(PI/4 * waterLevel + rotMod);
            drawBranch(len * 0.72, thickness * 0.7);
            pop();
            push();
            rotate(-PI/6 * waterLevel - rotMod);
            drawBranch(len * 0.72, thickness * 0.7);
            pop();
        } else if (waterLevel >= 1 && bgColor < 200) {
            isBlooming = true;
            drawFlowerOnBranch();
            
            // --- 2. Logika Daun Gugur (PENTING: Pakai Koordinat Layar) ---
            if (random(1) < 0.006) { 
                let m = drawingContext.getTransform();
                // m.e dan m.f adalah koordinat X,Y layar
                fallingLeaves.push(new Leaf(random(330, 360), m.e, m.f));
            }
        }
    }

    function drawFlowerOnBranch() {
        push();
        colorMode(HSB, 360, 100, 100, 255);
        noStroke();
        fill(random(330, 360), 60, 100, 150);
        for(let i=0; i<6; i++) {
            ellipse(1, 0, 6, 4);
            rotate(TWO_PI/6);
        }
        pop();
    }

    function drawNightSky() {
        fill(255, map(bgColor, 255, 10, 0, 200)); noStroke();
        for(let s of stars) ellipse(s.x, s.y, s.s);
        
        if (random(1) < 0.1) shootingStars.push(new ShootingStar());
        for (let i = shootingStars.length - 1; i >= 0; i--) {
            shootingStars[i].update(); shootingStars[i].display();
            if (shootingStars[i].offScreen()) shootingStars.splice(i, 1);
        }
    }

    function drawCampground() {
        let spacing = width > height ? width * 0.12 : 100; 
        let baseX = width * 0.5 + spacing; 
        let baseY = groundY;
        
        push();
        fill(40, 70, 40); stroke(20);
        triangle(baseX, baseY, baseX + 60, baseY, baseX + 30, baseY - 45);
        let fireX = baseX + 80;
        fill(100, 50, 20); rect(fireX - 8, baseY - 5, 16, 5);
        colorMode(HSB, 360, 100, 100);
        fill(random(10, 40), 100, 100);
        ellipse(fireX, baseY - 12, 10, 18);
        pop();
    }

    // --- 2. KELAS DAUN GUGUR (ANTI PITA & MENUMPUK DI TANAH) ---
    class Leaf {
        constructor(h, x, y) {
            this.h = h; this.x = x; this.y = y;
            this.alpha = 255;
            this.rot = random(TWO_PI);
            this.speedY = random(0.8, 1.8);
            this.speedX = random(-1, 1);
            this.size = random(3, 6);
        }
        update() {
            if (this.y < groundY - 2) {
                // Jatuh pelan-pelan
                this.y += this.speedY;
                this.x += this.speedX + sin(frameCount * 0.05);
                this.rot += 0.05;
            } else {
                // Menempel di tanah
                this.y = groundY - random(1, 3);
                this.speedY = 0; this.speedX = 0;
                this.alpha -= 4; // Menghilang perlahan
            }
        }
        display() {
            push();
            colorMode(HSB, 360, 100, 100, this.alpha);
            fill(this.h, 60, 100, this.alpha);
            noStroke();
            translate(this.x, this.y);
            rotate(this.rot);
            ellipse(0, 0, this.size, this.size * 1.5);
            pop();
        }
    }

    function waterSapling() {
        if (waterLevel < 1) waterLevel += 0.2;
        if (!played && song && song.isLoaded()) { song.loop(); played = true; }
    }

    class ShootingStar {
        constructor() {
            this.x = random(width * 0.1, width);
            this.y = random(0, height * 0.3);
            this.speed = random(10, 20);
            // --- 3. Mengecilkan Komet ---
            this.w = random(2, 5); 
        }
        update() {
            this.x -= this.speed;
            this.y += this.speed * 0.5;
        }
        display() {
            push();
            drawingContext.shadowBlur = 15;
            drawingContext.shadowColor = 'white';
            stroke(255);
            strokeWeight(this.w);
            // Ekor lebih pendek (100px)
            line(this.x, this.y, this.x + 100, this.y - 50);
            pop();
        }
        offScreen() { return this.x < -300; }
    }

    function drawText() {
        fill(180); noStroke(); textFont('Courier New');
        // --- 4. Memperbesar Teks di Laptop ---
        let txtSize = width > 700 ? 14 : 10;
        textSize(txtSize);
        // Posisi sedikit lebih naik agar tidak tertutup ground
        text("creation of kai sund_blue", 20, height - 75);
        text("09/03/2026", 20, height - 55);
        text("Find your happiness and don't be ashamed to express it.", 20, height - 35);
    }

    function windowResized() { 
        resizeCanvas(windowWidth, windowHeight); 
        groundY = height * 0.85;
    }
</script>
</body>
</html>
